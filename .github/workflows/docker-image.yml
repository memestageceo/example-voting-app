name: Docker Image CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    name: Build & Push ${{ matrix.app }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # needed for sigstore signing
      attestations: write # needed for build provenance
    
    strategy:
      fail-fast: false # don't cancel siblings if one app fails
      matrix:
        app: [vote, result, worker, seed-data]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0

        # --- Docker infrastructure ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log into GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Smart, branch/tag-aware tagging ---
      - name: Docker Metadata action
        id: meta
        # You may pin to the exact commit or the version.
        # uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        uses: docker/metadata-action@v6.1.0
        with:
          # List of Docker images to use as base name for tags
          images: ${{ ENV.IMAGE_PREFIX }}/${{ matrix.app }}
          # List of tags as key-value pair attributes
          tags: |
            # semver tags from git tags: v1.2.3 → 1.2.3, 1.2, 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # branch name for non-main branches
            type=ref,event=branch
            # pr-42 for pull requests (never pushed to prod)
            type=ref,event=pr
            # short SHA always present
            type=sha,format=short
          # List of custom labels
          labels: |
            org.opencontainers.image.title=${{ matrix.app }}
            org.opencontainers.image.vendor=YourOrg
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v7.2.0
        with:
          # layer cache via GHCR — survives across runners
          # List of external cache sources for buildx (e.g., user/app:cache, type=local,src=path/to/dir)
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:cache
          # List of cache export destinations for buildx (e.g., user/app:cache, type=local,dest=path/to/dir)
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:cache,mode=max
          # Build's context is the set of files located in the specified PATH or URL
          context: ${{ matrix.app }}
          # Path to the Dockerfile
          file: ./${{ matrix.app }}/Dockerfile
          # List of metadata for an image
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          # Generate provenance attestation for the build (shorthand for --attest=type=provenance)
          provenance: true
          # Push is a shorthand for --output=type=registry
          # push only on main branch or tags, not on PRs.
          push: ${{ github.event_name != 'pull_request' }}
          # Generate SBOM attestation for the build (shorthand for --attest=type=sbom)
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
      # --- Vulnerability scan (fails build if critical CVEs found) ---
      - name: Aqua Security Trivy
        # You may pin to the exact commit or the version.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          # image reference (for backward compatibility)
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:sha-${{ github.sha }}
          # exit code when vulnerabilities were found
          exit-code: 1
          # severities of vulnerabilities to be displayed
          severity: CRITICAL,HIGH
          # output format (table, json, template)
          format: sarif
          # writes results to a file with the specified file name
          output: trivy-${{ matrix.app }}.sarif
