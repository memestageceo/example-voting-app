name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4.2.0
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      -
        name: Build and push vote app
        uses: docker/build-push-action@v7.2.0
        with:
          context: vote
          file: ./vote/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/vote:latest
            ghcr.io/${{ github.repository_owner }}/vote:${{ github.sha }}
      -
        name: Build and push result app
        uses: docker/build-push-action@v7.2.0
        with:
          context: result
          file: ./result/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/result:latest
            ghcr.io/${{ github.repository_owner }}/result:${{ github.sha }}
      -
        name: Build and push worker app
        uses: docker/build-push-action@v7.2.0
        with:
          context: worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/worker:latest
            ghcr.io/${{ github.repository_owner }}/worker:${{ github.sha }}
      -
        name: Build and push seed data
        uses: docker/build-push-action@v7.2.0
        with:
          context: seed-data
          file: ./seed-data/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/seed-data:latest
            ghcr.io/${{ github.repository_owner }}/seed-data:${{ github.sha }}

